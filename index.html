<!DOCTYPE html>
<html>
<head>
    <title>Server Latihan GitHub</title>
    <style>
        body { background-color: #121212; color: #00ff00; text-align: center; font-family: 'Courier New', Courier, monospace; padding-top: 50px; }
        .status { border: 2px solid #00ff00; display: inline-block; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px #00ff00; }
        .counter { font-size: 24px; margin-top: 20px; color: #ffffff; background: #333; padding: 10px; display: inline-block; border-radius: 5px; }
        .ip-info { margin-top: 15px; font-size: 14px; color: #888; }
        <div style="margin-top: 20px;">
    <p>Total Pengunjung:</p>
    <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fdoniciro4-sudo.github.io%2FWeb-testingggg&count_bg=%2300FF00&title_bg=%23555555&icon=&icon_color=%23E7E7E7&title=Hits&edge_flat=false" alt="Hits">
</div>

    </style>
</head>
<body>
    <div class="status">
        <h1>SITUS AKTIF 24 JAM</h1>
        <p>Target latihan ini berjalan di GitHub Pages.</p>
        
        <div class="counter">
            Jumlah Akses: <span id="count">Memuat...</span>
        </div>

        <div class="ip-info">
            Status: <span style="color: lime;">Monitoring Active</span>
        </div>
    </div>

    <script>
        // Menggunakan API hit-counter gratis
        async function getHitCount() {
            try {
                // Kita gunakan API dari countapi.xyz atau goatcounter (ini contoh simpel menggunakan countapi)
                // Catatan: Jika API ini down, angka mungkin tidak muncul
                const response = await fetch('https://api.countapi.xyz/hit/doniciro4-sudo-test/visits');
                const data = await response.json();
                document.getElementById('count').innerText = data.value;
            } catch (error) {
                // Jika API error, kita tampilkan angka simulasi atau pesan
                document.getElementById('count').innerText = "Online";
            }
        }
        getHitCount();
    </script>
</body>
</html>
