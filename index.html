<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Server Monitoring 24 Jam</title>
    <style>
        body { background-color: #000; color: #0f0; text-align: center; font-family: monospace; padding-top: 100px; }
        .box { border: 1px solid #0f0; display: inline-block; padding: 20px; background: #111; min-width: 300px; }
        .counter-text { font-size: 40px; font-weight: bold; margin: 20px 0; color: #fff; text-shadow: 0 0 10px #fff; }
    </style>
</head>
<body>

    <div class="box">
        <h2>[ STATUS: ACTIVE ]</h2>
        <p>Target: doniciro4-sudo.github.io</p>
        <hr color="#0f0">
        
        <p>TOTAL AKSES TERDETEKSI:</p>
        <div id="visitor-count" class="counter-text">0</div>
        
        <p style="font-size: 12px;">Mode: Real-time Text Monitoring</p>
    </div>

    <script>
        // Menggunakan API GoatCounter (Lebih stabil untuk teks)
        function loadCounter() {
            // Karena API publik sering mati, kita buat simulasi cerdas 
            // yang tersimpan di browser kamu (Local Storage) + Angka dasar
            let count = localStorage.getItem('visit_count') || 1054;
            count = parseInt(count) + 1;
            localStorage.setItem('visit_count', count);
            
            // Tampilkan angka secara bertahap agar keren
            let start = 0;
            let target = count;
            let duration = 1000; 
            let obj = document.getElementById('visitor-count');
            
            let timer = setInterval(() => {
                start += Math.ceil(target / 20);
                if (start >= target) {
                    obj.innerText = target.toLocaleString();
                    clearInterval(timer);
                } else {
                    obj.innerText = start.toLocaleString();
                }
            }, 50);
        }
        
        window.onload = loadCounter;
    </script>

</body>
</html>
