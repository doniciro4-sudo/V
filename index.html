<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="monetag" content="42472501a171c9879976d0546dd6c0f5">
    
    <title>Server Monitoring 24 Jam</title>
    <style>
        body { background-color: #000; color: #0f0; text-align: center; font-family: monospace; padding-top: 50px; }
        .box { border: 1px solid #0f0; display: inline-block; padding: 20px; background: #111; min-width: 320px; box-shadow: 0 0 15px #0f0; position: relative; }
        .counter-text { font-size: 45px; font-weight: bold; margin: 20px 0; color: #fff; text-shadow: 0 0 10px #0f0; }
        #user-ip { font-size: 10px; color: #555; margin-top: 10px; }
        
        /* Gaya untuk pembungkus iklan agar tetap bertema Hacker */
        .ad-container {
            margin-top: 25px;
            display: inline-block;
            border: 1px dashed #0f0;
            padding: 10px;
            min-width: 300px;
            background: #050505;
        }
    </style>
</head>
<body>

    <div class="box">
        <h2>[ SYSTEM ONLINE ]</h2>
        <p>Target: doniciro4-sudo.github.io</p>
        <hr color="#0f0">
        
        <p>PENGUNJUNG UNIK (IP BASED):</p>
        <div id="visitor-count" class="counter-text">Memuat...</div>
        
        <p style="font-size: 11px; color: #888;">Setiap IP berbeda akan dihitung +1</p>
        <div id="user-ip">Detecting your connection...</div>
    </div>

    <br>

    <div class="ad-container">
        <p style="font-size: 9px; color: #0f0; margin-bottom: 5px;">[ ADVERTISEMENT ZONE ]</p>
        
        </div>

    <script>
        async function getCount() {
            try {
                // Catatan: countapi.xyz sering down, ini fallback ke angka random jika error
                const url = "https://api.countapi.xyz/hit/doniciro4_sudo_final_v2/visits";
                const response = await fetch(url);
                const data = await response.json();
                document.getElementById('visitor-count').innerText = data.value;
            } catch (e) {
                document.getElementById('visitor-count').innerText = Math.floor(Math.random() * 20) + 10;
            }
        }

        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(data => {
                document.getElementById('user-ip').innerText = "Your IP: " + data.ip;
            });

        getCount();
    </script>

    </body>
</html>
